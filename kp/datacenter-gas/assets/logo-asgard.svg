  <!-- ASGard wordmark -->
  <text x="170" y="135" font-family="'Montserrat','Inter','Helvetica Neue',Arial,sans-serif"
        font-weight="900" font-size="150" letter-spacing="-2" fill="url(#textGrad)">ASGard</text>
  <!-- Technology label, right-aligned under wordmark -->
  <text x="743" y="200" text-anchor="end"
        font-family="'Montserrat','Inter','Helvetica Neue',Arial,sans-serif"
        font-weight="800" font-size="48" letter-spacing="1" fill="#0E2E1E">Technology</text>
</svg>
