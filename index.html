<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    img { max-width: 280px; max-height: 160px; object-fit: contain; }
    .err { color: #c44; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const d = new URLSearchParams(location.search).get('d');
    const root = document.getElementById('root');
    if (!d) {
      root.innerHTML = '<span class="err">?d=domain.com</span>';
    } else {
      const img = document.createElement('img');
      img.src = `logos/${d}.webp`;
      img.alt = d;
      img.onerror = () => { root.innerHTML = '<span class="err">Логотип не найден</span>'; };
      root.appendChild(img);
    }
  </script>
</body>
</html>
