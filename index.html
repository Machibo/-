<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px 60px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
      max-width: 480px;
      width: 90%;
    }
    .logo-wrap {
      width: 200px;
      height: 120px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-wrap img {
      max-width: 200px;
      max-height: 120px;
      object-fit: contain;
    }
    .domain {
      color: #888;
      font-size: 14px;
      margin-top: 8px;
    }
    .error {
      color: #e55;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap" id="logoWrap"></div>
    <div class="domain" id="domainLabel"></div>
  </div>
  <script>
    const CLIENT_ID = '1idF1Fj7KzTGO52xbKN';
    const params = new URLSearchParams(window.location.search);
    const domain = params.get('d') || '';

    const wrap = document.getElementById('logoWrap');
    const label = document.getElementById('domainLabel');

    if (!domain) {
      wrap.innerHTML = '<span class="error">Укажи домен: ?d=lenta.ru</span>';
    } else {
      label.textContent = domain;
      const img = document.createElement('img');
      img.src = `https://cdn.brandfetch.io/${domain}?c=${CLIENT_ID}`;
      img.alt = domain;
      img.onerror = () => {
        wrap.innerHTML = '<span class="error">Логотип не найден</span>';
      };
      wrap.appendChild(img);
    }
  </script>
</body>
</html>
